# Ruby CircleCI 2.0 configuration file
#
# Check https://circleci.com/docs/2.0/language-ruby/ for more details
#
version: 2
jobs:
  build:
    parallelism: 1
    working_directory: ~/cadet-app

    docker:
      # specify the version you desire here
      - image: circleci/ruby:2.4.10-node-browsers
        environment:
          BUNDLE_JOBS: 3
          BUNDLE_RETRY: 3
          BUNDLE_PATH: vendor/bundle
          PGHOST: 127.0.0.1
          PGUSER: cadet
          RAILS_ENV: test
      
      # Specify service dependencies here if necessary
      # CircleCI maintains a library of pre-built images
      # documented at https://circleci.com/docs/2.0/circleci-images/
      - image: circleci/postgres:9.4-alpine
        environment:
          POSTGRES_USER: cadet
          POSTGRES_DB: cadet_test
          POSTGRES_PASSWORD: ""

    steps:
      - checkout

      - run:
          name: Copy Config Files
          command: |
            cp config/cadet_config.example.yml config/cadet_config.yml
            cp config/secrets.example.yml config/secrets.yml

      - run:
          name: install dependencies
          command: |
            gem update --system
            gem install bundler
      
      # Which version of bundler?
      - run:
          name: Which bundler?
          command: bundle -v

      # Which version of bundler?
      - run:
          name: Which node?
          command: node -v
      
      # Restore bundle cache
      # Read about caching dependencies: https://circleci.com/docs/2.0/caching/
      - restore_cache:
          keys:
            - cadet-bundle-v2-{{ checksum "Gemfile.lock" }}
            - cadet-bundle-v2-
      
      - run: # Set bundle config
          command: |
            bundle config set path 'vendor/bundle'
            bundle config set deployment 'true'

      - run: # Install Ruby dependencies
          name: Bundle Install
          command: bundle install

      # Store bundle cache for Ruby dependencies
      - save_cache:
          key: cadet-bundle-v2-{{ checksum "Gemfile.lock" }}
          paths:
            - vendor/bundle

      # Only necessary if app uses webpacker or yarn in some other way
      - restore_cache:
          keys:
            - cadet-yarn-{{ checksum "yarn.lock" }}
            - cadet-yarn-

      - run:
          name: Yarn Install
          command: yarn install --ignore-optional --cache-folder ~/.cache/yarn

      # Store yarn / webpacker cache
      - save_cache:
          key: cadet-yarn-{{ checksum "yarn.lock" }}
          paths:
            - ~/.cache/yarn
      
      # Database setup
      - run:
          name: Wait for DB
          command: dockerize -wait tcp://localhost:5432 -timeout 1m

      - run:
          name: Database setup
          command: bin/rails db:schema:load --trace

      # run tests!
      - run:
          name: RSpec Unit Tests
          command: |
            bundle exec rspec spec/

      - run:
          name: Run Rubocop for Style Violations
          command: bundle exec rubocop

      # collect reports
      - store_test_results:
          path: /tmp/test-results
      - store_artifacts:
          path: /tmp/test-results
          destination: test-results
